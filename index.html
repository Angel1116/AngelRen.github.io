<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        *{  box-sizing: border-box;       /*對以下所有物件都設定這個樣式（任何尺寸設定也都要包含邊框）*/
            margin: 0;                    /*（此物件和外面物件的距離）*/
            padding: 0; }                 /*（此物件內部，文字和邊框的距離）*/
        h1  {color:rgb(99, 55, 10);}    /*對以下所有h1物件(標題一)都設定這個樣式*/
        h2  {color:rgb(222, 142, 62);}  /*對以下所有h2物件(標題二)都設定這個樣式*/
        div {width: 300px;                /*對以下所有div物件(空白區塊, division)都設定這個樣式*/
             height: 100px;
             background-color: rgb(222, 142, 62);
             border-radius: 8px;}          /*設定圓角角度（直角要被削掉多少，愈多愈圓）*/
    </style>
</head>
<body>
    <h1>Angel's Website</h1>
    <h2>title1</h2>
    <h3>body text1</h3>
    <h2>title2</h2>
    <h2>title3</h2>
    <div></div>
    <h2>title4</h2>
    <img src="../img/soumya.png" alt="">
</body>
</html>
